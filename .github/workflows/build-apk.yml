name: Build APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Gradle wrapper (8.7)
        working-directory: android
        run: gradle wrapper --gradle-version 8.7

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk dls-bot.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dls-bot-apk
          path: dls-bot.apk

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          name: DLS Bot v1.0
          body: "Avtomatik yig'ilgan DLS offline bot APK. Faqat offline rejim uchun."
          files: dls-bot.apk
